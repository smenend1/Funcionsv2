<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathEngine Universal AI</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --p: #2563eb; --bg: #f8fafc; --card: #ffffff; --txt: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--p); color: white; padding: 1rem; text-align: center; font-weight: bold; }
        .main-layout { display: grid; grid-template-columns: 450px 1fr; gap: 20px; padding: 20px; flex: 1; overflow: hidden; }
        @media (max-width: 1000px) { .main-layout { grid-template-columns: 1fr; overflow: auto; } }
        .sidebar { display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-right: 5px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        select, input, textarea { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; font-size: 1rem; }
        .btn-solve { background: var(--p); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .result-panel { background: #f1f5f9; padding: 15px; border-radius: 10px; border-left: 5px solid var(--p); margin-top: 15px; }
        .chart-container { position: relative; height: 100%; min-height: 400px; }
        .hidden { display: none; }
        .formula-display { font-family: 'Courier New', monospace; background: #000; color: #0f0; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 1.1rem; text-align: center; }
    </style>
</head>
<body>

<header>MathEngine AI: Resoledor Universal de Problemes</header>

<div class="main-layout">
    <div class="sidebar">
        <div class="card">
            <h3>1. Identifica l'estructura del problema</h3>
            <select id="model-selector" onchange="updateUI()">
                <option value="lineal">📊 Creixement Constant (Ex: Preus, km, molles, gas)</option>
                <option value="edats">👥 Relació de dues persones (Edats actuals i futures)</option>
                <option value="inversa">📉 Repartiment o Velocitat (Proporcionalitat inversa)</option>
                <option value="manual">✏️ Tinc la meva pròpia equació (f(x) = ...)</option>
            </select>

            <div id="ui-lineal">
                <label>Quant val al principi? (Valor fix/n):</label>
                <input type="number" id="l-n" placeholder="Ex: 2.05 o 30">
                <label>Quant puja/baixa per cada unitat? (m):</label>
                <input type="number" id="l-m" placeholder="Ex: 0.93 o 10">
            </div>

            <div id="ui-edats" class="hidden">
                <label>Edat de la persona 1 avui:</label>
                <input type="number" id="e-a" placeholder="Ex: 40">
                <label>Edat de la persona 2 avui:</label>
                <input type="number" id="e-b" placeholder="Ex: 10">
            </div>

            <div id="ui-inversa" class="hidden">
                <label>Valor total a repartir (k):</label>
                <input type="number" id="i-k" placeholder="Ex: 100">
            </div>

            <div id="ui-manual" class="hidden">
                <label>Escriu l'expressió algebraica:</label>
                <input type="text" id="m-eq" value="x^2 - 4">
            </div>

            <button class="btn-solve" onclick="executarAnalisi()">GENERAR SOLUCIÓ</button>
        </div>

        <div id="panel-resultats" class="card hidden">
            <h3>2. Anàlisi del Sistema</h3>
            <div id="f-output" class="formula-display"></div>
            <div id="text-output" class="result-panel"></div>
        </div>
    </div>

    <div class="card chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    let myChart = null;

    function updateUI() {
        const val = document.getElementById('model-selector').value;
        ['ui-lineal', 'ui-edats', 'ui-inversa', 'ui-manual'].forEach(id => {
            document.getElementById(id).classList.toggle('hidden', id !== 'ui-' + val);
        });
    }

    function executarAnalisi() {
        const model = document.getElementById('model-selector').value;
        let expr = "";
        let descripcio = "";
        let xMin = -5, xMax = 15;

        if (model === 'lineal') {
            const m = parseFloat(document.getElementById('l-m').value) || 0;
            const n = parseFloat(document.getElementById('l-n').value) || 0;
            expr = `${m} * x + ${n}`;
            descripcio = `Aquesta és una funció lineal. Comença en ${n} i varia ${m} unitats per cada x.`;
        } else if (model === 'edats') {
            const a = parseFloat(document.getElementById('e-a').value) || 0;
            const b = parseFloat(document.getElementById('e-b').value) || 0;
            expr = `(${a} + x) / (${b} + x)`;
            descripcio = `Analitzem quantes vegades l'edat de la persona A serà més gran que la B amb el pas dels anys (x).`;
            xMin = 0; xMax = 100;
        } else if (model === 'inversa') {
            const k = parseFloat(document.getElementById('i-k').value) || 1;
            expr = `${k} / x`;
            descripcio = `Proporcionalitat inversa. Si x augmenta, y disminueix dràsticament.`;
            xMin = 1;
        } else {
            expr = document.getElementById('m-eq').value;
            descripcio = "Anàlisi lliure de l'expressió introduïda.";
        }

        processarDades(expr, descripcio, xMin, xMax);
    }

    function processarDades(expr, desc, xMin, xMax) {
        try {
            const node = math.parse(expr);
            const f = node.compile();
            const labels = [], data = [], colors = [], radius = [];
            
            const step = (xMax - xMin) / 100;
            for (let x = xMin; x <= xMax; x = math.round(x + step, 10)) {
                let y = f.evaluate({x: x});
                if (isFinite(y)) {
                    labels.push(x.toFixed(1));
                    data.push(y);
                    // Detecció punts de tall (vermell)
                    if (Math.abs(y) < 0.2 || Math.abs(x) < 0.01) {
                        colors.push('#ef4444'); radius.push(6);
                    } else {
                        colors.push('#2563eb'); radius.push(0);
                    }
                }
            }

            // UI de resultats
            document.getElementById('panel-resultats').classList.remove('hidden');
            document.getElementById('f-output').innerText = "y = " + node.toString();
            
            const yValid = data.filter(v => v !== null);
            const imatgeMin = Math.min(...yValid).toFixed(2);
            const imatgeMax = Math.max(...yValid).toFixed(2);
            const tallY = f.evaluate({x: 0});

            document.getElementById('text-output').innerHTML = `
                <p><b>📏 Domini:</b> Tots els valors reals entre ${xMin} i ${xMax}.</p>
                <p><b>🖼️ Imatge (Recorregut):</b> [${imatgeMin}, ${imatgeMax}]</p>
                <p><b>📍 Punts de tall:</b> Tall Y a (0, ${isFinite(tallY) ? tallY.toFixed(2) : 'No existeix'}). Talls X en vermell.</p>
                <p><i>${desc}</i></p>
            `;

            dibuixar(labels, data, colors, radius);
        } catch (e) { alert("Error en el càlcul. Revisa l'equació."); }
    }

    function dibuixar(l, d, c, r) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: l,
                datasets: [{
                    data: d, borderColor: '#2563eb', borderWidth: 3,
                    pointBackgroundColor: c, pointRadius: r, tension: 0.1, fill: false
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    window.onload = executarAnalisi;
</script>
</body>
</html>
