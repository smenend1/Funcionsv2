<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathEngine Solver</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --p: #0070f3; --bg: #f5f5f7; --card: #ffffff; --txt: #1d1d1f; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #fff; padding: 15px 20px; border-bottom: 1px solid #d2d2d7; font-weight: 700; color: var(--p); }
        .layout { display: grid; grid-template-columns: 400px 1fr; flex: 1; overflow: hidden; }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; overflow: auto; } }
        
        .sidebar { padding: 20px; overflow-y: auto; background: #fff; border-right: 1px solid #d2d2d7; }
        .chart-area { position: relative; padding: 20px; display: flex; flex-direction: column; }
        
        .card { background: var(--bg); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #d2d2d7; }
        h3 { font-size: 0.75rem; text-transform: uppercase; color: #86868b; margin-top: 0; }
        
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d2d2d7; margin-top: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        .step { border-left: 2px solid var(--p); padding-left: 10px; margin-bottom: 10px; font-size: 0.85rem; }
        .math-font { font-family: 'JetBrains Mono', monospace; font-weight: bold; color: var(--p); }
        #canvas-wrap { flex: 1; background: white; border-radius: 12px; border: 1px solid #d2d2d7; position: relative; }
    </style>
</head>
<body>

<header>MATHENGINE SOLVER</header>

<div class="layout">
    <div class="sidebar">
        <div class="input-group">
            <h3>Tipus d'equació</h3>
            <select id="type" onchange="initUI()">
                <option value="lin">Lineal (y = mx + n)</option>
                <option value="quad">Quadràtica (y = ax² + bx + c)</option>
            </select>
        </div>

        <div id="fields"></div>
        <button class="btn" onclick="solve()">RESOLDRE PAS A PAS</button>

        <div id="solution-panel" style="display:none; margin-top: 20px;">
            <div class="card">
                <h3>Resultats Finals</h3>
                <p id="res-eq" class="math-font"></p>
                <p id="res-points"></p>
            </div>
            <div class="card">
                <h3>Procediment</h3>
                <div id="steps"></div>
            </div>
        </div>
    </div>

    <div class="chart-area">
        <div id="canvas-wrap">
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<script>
    let myChart = null;

    function initUI() {
        const t = document.getElementById('type').value;
        const f = document.getElementById('fields');
        if(t === 'lin') {
            f.innerHTML = `<label>m</label><input type="number" id="vM" value="2"><label>n</label><input type="number" id="vN" value="-6">`;
        } else {
            f.innerHTML = `<label>a</label><input type="number" id="vA" value="1"><label>b</label><input type="number" id="vB" value="-2"><label>c</label><input type="number" id="vC" value="-3">`;
        }
    }

    function solve() {
        const t = document.getElementById('type').value;
        let steps = "";
        let tallsX = [];
        let expr = "";

        if(t === 'lin') {
            const m = parseFloat(document.getElementById('vM').value);
            const n = parseFloat(document.getElementById('vN').value);
            expr = `${m}*x + ${n}`;
            steps += `<div class="step"><b>1. Tall Y:</b> Substituïm x=0 → y = ${m}(0) + (${n}) = <b>${n}</b>.</div>`;
            if(m !== 0) {
                const x0 = -n/m;
                tallsX.push(x0);
                steps += `<div class="step"><b>2. Tall X:</b> Igualem a zero → ${m}x + ${n} = 0 → x = ${-n}/${m} = <b>${x0.toFixed(2)}</b>.</div>`;
            }
        } else {
            const a = parseFloat(document.getElementById('vA').value);
            const b = parseFloat(document.getElementById('vB').value);
            const c = parseFloat(document.getElementById('vC').value);
            expr = `${a}*x^2 + ${b}*x + ${c}`;
            steps += `<div class="step"><b>1. Tall Y:</b> Substituïm x=0 → y = <b>${c}</b>.</div>`;
            const disc = b*b - 4*a*c;
            steps += `<div class="step"><b>2. Discriminant:</b> Δ = ${b}² - 4·${a}·${c} = <b>${disc}</b>.</div>`;
            if(disc >= 0) {
                const x1 = (-b + Math.sqrt(disc))/(2*a);
                const x2 = (-b - Math.sqrt(disc))/(2*a);
                tallsX.push(x1, x2);
                steps += `<div class="step"><b>3. Tall X:</b> Usem la fórmula general. Arrels: <b>${x1.toFixed(2)}</b> i <b>${x2.toFixed(2)}</b>.</div>`;
            } else {
                steps += `<div class="step"><b>3. Tall X:</b> Δ negatiu, no hi ha talls amb l'eix X.</div>`;
            }
        }

        document.getElementById('solution-panel').style.display = 'block';
        document.getElementById('res-eq').innerText = "y = " + expr;
        document.getElementById('steps').innerHTML = steps;
        document.getElementById('res-points').innerHTML = `Talls X: ${tallsX.map(x => `(${x.toFixed(1)}, 0)`).join(', ')}`;

        render(expr, tallsX);
    }

    function render(expr, talls) {
        const f = math.compile(expr);
        const labels = [], data = [], colors = [], radius = [];
        for(let x=-10; x<=10; x+=0.5) {
            let y = f.evaluate({x:x});
            labels.push(x); data.push(y);
            let isTall = talls.some(tx => Math.abs(tx-x) < 0.4) || Math.abs(x) < 0.1;
            colors.push(isTall ? '#f43f5e' : 'transparent');
            radius.push(isTall ? 5 : 0);
        }

        const ctx = document.getElementById('chart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels, datasets: [{ data, borderColor: '#0070f3', borderWidth: 3, pointBackgroundColor: colors, pointRadius: radius, tension: 0.3 }] },
            options: { 
                responsive: true, maintainAspectRatio: false,
                scales: { 
                    x: { type: 'linear', position: 'center', min: -10, max: 10 }, 
                    y: { type: 'linear', position: 'center', min: -10, max: 10 } 
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = () => { initUI(); solve(); };
</script>
</body>
</html>
