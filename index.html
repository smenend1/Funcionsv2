<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathEngine PWA - Solucionari Universal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --p: #2563eb; --s: #0f172a; --bg: #f8fafc; --accent: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--s); margin: 0; padding: 20px; }
        .container { display: grid; grid-template-columns: 450px 1fr; gap: 20px; max-width: 1600px; margin: 0 auto; }
        @media (max-width: 1100px) { .container { grid-template-columns: 1fr; } }
        
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 1rem; margin-top: 10px; }
        button { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* Resultats Estil Fitxa */
        .results-box { margin-top: 20px; background: var(--s); color: white; padding: 20px; border-radius: 12px; }
        .eq-display { color: #38bdf8; font-size: 1.6rem; font-family: monospace; margin: 10px 0; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid #334155; pt: 15px; margin-top: 15px; }
        .info-item b { display: block; color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; }
        
        .table-wrap { margin-top: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; color: white; }
        th, td { border: 1px solid #334155; padding: 5px; text-align: center; }

        .chart-wrap { height: 600px; }
    </style>
</head>
<body>

<div class="container">
    <aside>
        <div class="card">
            <h2 style="margin:0">🧠 Analitzador de Problemes</h2>
            <p style="font-size: 0.9rem; color: #64748b;">Escriu l'enunciat o la funció directament:</p>
            <textarea id="userInput" placeholder="Ex: Tinc 10€ i cada dia en guanyo 2..."></textarea>
            <button onclick="processar()">GENERAR SOLUCIÓ COMPLETA</button>

            <div id="panel" class="results-box" style="display:none">
                <div style="font-size: 0.7rem; opacity: 0.7;">EQUACIÓ PLANTEJADA:</div>
                <div id="out-eq" class="eq-display"></div>
                
                <div class="info-grid">
                    <div class="info-item"><b>Domini:</b><span id="out-dom"></span></div>
                    <div class="info-item"><b>Imatge:</b><span id="out-im"></span></div>
                    <div class="info-item"><b>Punt de Tall Y:</b><span id="out-ty"></span></div>
                    <div class="info-item"><b>Punt de Tall X:</b><span id="out-tx"></span></div>
                </div>

                <div class="table-wrap">
                    <b>Taula de valors (Fitxa 2):</b>
                    <table id="data-table"><thead><tr id="tr-h"></tr></thead><tbody><tr id="tr-b"></tr></tbody></table>
                </div>
            </div>
        </div>
    </aside>

    <main class="card chart-wrap">
        <canvas id="mainChart"></canvas>
    </main>
</div>

<script>
    let chart = null;

    function processar() {
        const text = document.getElementById('userInput').value;
        let m = 0, n = 0;

        // Lògica de traducció (Text -> Propietats)
        const nums = text.match(/-?\d+(?:\.\d+)?/g)?.map(Number) || [0,0];
        
        if (text.includes("cada") || text.includes("per")) {
            // Busquem quin és el valor que acompanya la variació
            if (text.includes("fix") || text.includes("inicial") || text.includes("tinc")) {
                n = nums[0]; m = nums[1] || 0;
            } else {
                m = nums[0]; n = nums[1] || 0;
            }
        } else {
            // Si és una funció escrita com y=2x+3
            try {
                const clean = text.replace(/y\s*=\s*/, "").replace(/f\(x\)\s*=\s*/, "");
                const node = math.parse(clean);
                // Si és lineal, extraiem m i n per a l'anàlisi de punts de tall
                m = node.evaluate({x: 1}) - node.evaluate({x: 0});
                n = node.evaluate({x: 0});
            } catch(e) { n = nums[0]; m = nums[1] || 0; }
        }

        // Correcció de signe
        if (text.match(/gasto|perdo|baixa|disminueix/i)) m = -Math.abs(m);

        analitzar(m, n);
    }

    function analitzar(m, n) {
        const expr = `${m}*x + ${n}`;
        const f = math.compile(expr);
        const labels = [], data = [], colors = [], radius = [];
        
        // Càlcul de Domini i Imatge (Fitxa 3)
        // Definim un interval de treball de 0 a 10 (comú a les fitxes)
        for (let x = 0; x <= 10; x++) {
            let y = f.evaluate({x: x});
            labels.push(x);
            data.push(y);
            // Punts de Tall visuals (Fitxa 3)
            if (Math.abs(y) < 0.1 || x === 0) { colors.push('#ef4444'); radius.push(7); }
            else { colors.push('#2563eb'); radius.push(3); }
        }

        // Actualitzar UI
        document.getElementById('panel').style.display = 'block';
        document.getElementById('out-eq').innerText = `y = ${m}x ${n >= 0 ? '+ '+n : n}`;
        document.getElementById('out-dom').innerText = "[0, 10]";
        document.getElementById('out-im').innerText = `[${Math.min(...data).toFixed(1)}, ${Math.max(...data).toFixed(1)}]`;
        document.getElementById('out-ty').innerText = `(0, ${n})`;
        document.getElementById('out-tx').innerText = m !== 0 ? `(${( -n/m ).toFixed(2)}, 0)` : "Cap";

        // Omplir Taula (Fitxa 2)
        const trH = document.getElementById('tr-h'), trB = document.getElementById('tr-b');
        trH.innerHTML = '<th>x</th>' + labels.slice(0,6).map(l => `<th>${l}</th>`).join('');
        trB.innerHTML = '<td>y</td>' + data.slice(0,6).map(d => `<td>${d.toFixed(1)}</td>`).join('');

        dibuixar(labels, data, colors, radius);
    }

    function dibuixar(l, d, c, r) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: l,
                datasets: [{
                    data: d, borderColor: '#2563eb', borderWidth: 3,
                    pointBackgroundColor: c, pointRadius: r, tension: 0.1
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { title: { display: true, text: 'Variable x' } },
                    y: { title: { display: true, text: 'Variable y' } }
                }
            }
        });
    }

    window.onload = () => { processar(); }
</script>
</body>
</html>
