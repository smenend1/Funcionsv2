<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathEngine Pro V2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --p: #6366f1; --s: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        .app-container { display: grid; grid-template-columns: 380px 1fr; gap: 20px; flex: 1; min-height: 0; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; flex-direction: column; overflow: hidden; }
        .sidebar { padding: 20px; overflow-y: auto; }
        .chart-area { padding: 10px; position: relative; }
        
        h2 { color: var(--p); margin: 0 0 15px 0; font-size: 1.4rem; }
        label { font-size: 0.8rem; font-weight: 700; color: #64748b; display: block; margin-top: 10px; }
        select, input { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; margin-top: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--p); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        .results { background: var(--s); color: white; padding: 15px; border-radius: 12px; margin-top: 15px; font-size: 0.85rem; }
        .res-line { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px solid #334155; padding-bottom: 3px; }
        .res-line b { color: #818cf8; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="card sidebar">
        <h2>MathEngine Pro</h2>
        
        <label>Tipus d'exercici:</label>
        <select id="type" onchange="toggleInputs()">
            <option value="lineal">Lineal (Fitxa 1 i 2)</option>
            <option value="quad">Quadràtica (Fitxa 3)</option>
            <option value="manual">Escriure fórmula (y = ...)</option>
        </select>

        <div id="dynamic-inputs">
            </div>

        <button onclick="update()">CALCULAR I DIBUIXAR</button>

        <div id="results-box" class="results" style="display:none">
            <div class="res-line"><span>Equació:</span> <b id="r-eq"></b></div>
            <div class="res-line"><span>Domini:</span> <b id="r-dom"></b></div>
            <div class="res-line"><span>Imatge:</span> <b id="r-im"></b></div>
            <div class="res-line"><span>Tall Y:</span> <b id="r-ty"></b></div>
            <div class="res-line"><span>Tall X:</span> <b id="r-tx"></b></div>
        </div>
    </aside>

    <main class="card chart-area">
        <canvas id="canvas"></canvas>
    </main>
</div>

<script>
    let chart = null;

    function toggleInputs() {
        const t = document.getElementById('type').value;
        const div = document.getElementById('dynamic-inputs');
        if (t === 'lineal') {
            div.innerHTML = `
                <label>Baixada bandera / Fix (n):</label><input type="number" id="v1" value="2.05">
                <label>Preu per unitat (m):</label><input type="number" id="v2" value="0.93">
            `;
        } else if (t === 'quad') {
            div.innerHTML = `
                <label>Coeficient a (x²):</label><input type="number" id="v1" value="1">
                <label>Coeficient b (x):</label><input type="number" id="v2" value="-4">
                <label>Terme c (fix):</label><input type="number" id="v3" value="3">
            `;
        } else {
            div.innerHTML = `<label>Escriu la funció:</label><input type="text" id="v1" value="x^2 - 4">`;
        }
    }

    function update() {
        const t = document.getElementById('type').value;
        let expr = "";
        if(t === 'lineal') expr = `${document.getElementById('v2').value}*x + ${document.getElementById('v1').value}`;
        else if(t === 'quad') expr = `${document.getElementById('v1').value}*x^2 + ${document.getElementById('v2').value}*x + ${document.getElementById('v3').value}`;
        else expr = document.getElementById('v1').value;

        const node = math.parse(expr);
        const f = node.compile();
        
        const labels = [], data = [], colors = [], radius = [];
        // Límits del gràfic (Això soluciona el problema del Zoom)
        const range = 10; 
        
        for (let x = -range; x <= range; x += 0.5) {
            let y = f.evaluate({x: x});
            labels.push(x);
            data.push(y);
            // Marcar punts de tall
            if (Math.abs(y) < 0.3 || Math.abs(x) < 0.1) {
                colors.push('#f43f5e'); radius.push(6);
            } else {
                colors.push('#6366f1'); radius.push(0);
            }
        }

        // Mostrar dades d'anàlisi
        document.getElementById('results-box').style.display = 'block';
        document.getElementById('r-eq').innerText = "y = " + node.toString();
        document.getElementById('r-dom').innerText = "R (Tots els reals)";
        const yFiltered = data.filter(v => isFinite(v));
        document.getElementById('r-im').innerText = `[${Math.min(...yFiltered).toFixed(1)}, ${Math.max(...yFiltered).toFixed(1)}]`;
        document.getElementById('r-ty').innerText = `(0, ${f.evaluate({x:0}).toFixed(2)})`;
        
        draw(labels, data, colors, radius, range);
    }

    function draw(l, d, c, r, range) {
        const ctx = document.getElementById('canvas').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: l,
                datasets: [{
                    data: d, borderColor: '#6366f1', borderWidth: 3,
                    pointBackgroundColor: c, pointRadius: r, tension: 0.2, fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'linear', position: 'center',
                        min: -range, max: range,
                        grid: { color: '#e2e8f0' },
                        ticks: { stepSize: 1 }
                    },
                    y: {
                        type: 'linear', position: 'center',
                        min: -range, max: range, // Aquí fixem el zoom
                        grid: { color: '#e2e8f0' },
                        ticks: { stepSize: 1 }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = () => { toggleInputs(); update(); };
</script>
</body>
</html>
