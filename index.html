<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathEngine AI - Resoledor d'Enunciats</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --p: #2563eb; --accent: #ef4444; --bg: #f8fafc; --card: #ffffff; --txt: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding: 20px; }
        .container { display: grid; grid-template-columns: 450px 1fr; gap: 20px; max-width: 1600px; margin: 0 auto; }
        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }
        .card { background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        h2 { color: var(--p); margin-top: 0; font-size: 1.3rem; margin-bottom: 10px; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        /* Estils de les dades d'anàlisi */
        .analysis-results { margin-top: 20px; background: #0f172a; color: #f8fafc; padding: 20px; border-radius: 12px; }
        .formula-box { font-family: 'Courier New', monospace; font-size: 1.5rem; color: #38bdf8; margin: 10px 0; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 0.9rem; }
        .data-item b { color: #94a3b8; display: block; font-size: 0.75rem; text-transform: uppercase; }
        
        .chart-wrap { height: 600px; }
        .tag { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <aside>
        <div class="card">
            <h2>🤖 Traductor Lògic</h2>
            <p style="font-size: 0.9rem; color: #64748b;">Escriu el problema tal com raja. L'app detectarà els valors clau.</p>
            <textarea id="userInput" placeholder="Ex: El taxi costa 2 d'entrada i 1 per km..."></textarea>
            <button onclick="analitzarProblema()">GENERAR I ANALITZAR</button>

            <div id="results" class="analysis-results" style="display:none">
                <span class="tag">ANÀLISI AUTOMÀTIC</span>
                <div id="out-eq" class="formula-box"></div>
                
                <div class="data-grid">
                    <div class="data-item"><b>Domini (Eix X)</b><span id="out-dom">-</span></div>
                    <div class="data-item"><b>Imatge (Eix Y)</b><span id="out-im">-</span></div>
                    <div class="data-item"><b>Tall Eix Y</b><span id="out-ty">-</span></div>
                    <div class="data-item"><b>Tall Eix X</b><span id="out-tx">-</span></div>
                </div>
                
                <div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #334155;">
                    <b>💡 Interpretació:</b>
                    <p id="out-desc" style="font-size: 0.85rem; color: #cbd5e1; margin-top: 5px;"></p>
                </div>
            </div>
        </div>
    </aside>

    <main class="card chart-wrap">
        <canvas id="mainChart"></canvas>
    </main>
</div>

<script>
    let myChart = null;

    function analitzarProblema() {
        const text = document.getElementById('userInput').value.toLowerCase();
        const numeros = text.match(/\d+(?:\.\d+)?/g);
        
        if (!numeros) { alert("Si us plau, introdueix números a l'enunciat."); return; }
        const nums = numeros.map(Number);

        let m = 0, n = 0, desc = "";
        
        // Lògica de traducció automàtica (Intel·ligència de paraules clau)
        if (text.includes("cada") || text.includes("per") || text.includes("per cada")) {
            // El número que va amb "cada" acostuma a ser el pendent (m)
            // L'altre és el fix (n)
            if (nums.length >= 2) {
                // Si l'usuari diu "X cada Y", m sol ser el primer o segon depenent del context
                // Busquem paraules de "valor inicial"
                if (text.includes("fix") || text.includes("inicial") || text.includes("tinc") || text.includes("comença")) {
                    n = nums[0]; m = nums[1];
                } else {
                    m = nums[0]; n = nums[1] || 0;
                }
            } else {
                m = nums[0]; n = 0;
            }

            if (text.includes("gasto") || text.includes("baixa") || text.includes("perd")) m = -Math.abs(m);
            desc = `Hem detectat una relació lineal on el valor canvia en ${m} unitats per cada x.`;
        } else {
            // Si no hi ha "cada", suposem que són dades estàtiques o un altre model
            n = nums[0]; m = nums[1] || 0;
            desc = "S'ha generat una interpretació directa dels números trobats.";
        }

        executarMotor(m, n, desc);
    }

    function executarMotor(m, n, desc) {
        const expr = `${m} * x + ${n}`;
        const f = math.compile(expr);
        
        const labels = [], data = [], colors = [], radius = [];
        const xMin = 0, xMax = 20; // Rang estàndard per a problemes escolars

        for (let x = xMin; x <= xMax; x++) {
            let y = f.evaluate({x: x});
            labels.push(x);
            data.push(y);
            
            // Lògica de Punts de Tall (vermell i gran al gràfic)
            if (Math.abs(y) < 0.5 || x === 0) {
                colors.push('#ef4444'); radius.push(7);
            } else {
                colors.push('#2563eb'); radius.push(2);
            }
        }

        // Càlculs d'anàlisi real (Fitxa 3)
        document.getElementById('results').style.display = 'block';
        document.getElementById('out-eq').innerText = `y = ${m}x + ${n}`;
        document.getElementById('out-dom').innerText = `[${xMin}, ${xMax}] (en el context)`;
        document.getElementById('out-im').innerText = `[${Math.min(...data).toFixed(1)}, ${Math.max(...data).toFixed(1)}]`;
        document.getElementById('out-ty').innerText = `(0, ${n})`;
        
        const tallX = m !== 0 ? (-n / m).toFixed(2) : "Cap";
        document.getElementById('out-tx').innerText = tallX;
        document.getElementById('out-desc').innerText = desc;

        dibuixar(labels, data, colors, radius);
    }

    function dibuixar(l, d, c, r) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: l,
                datasets: [{
                    label: 'Representació de la funció',
                    data: d,
                    borderColor: '#2563eb',
                    borderWidth: 3,
                    pointBackgroundColor: c,
                    pointRadius: r,
                    tension: 0.1,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: '#f1f5f9' } },
                    x: { grid: { color: '#f1f5f9' }, title: { display: true, text: 'Variable Independent (x)' } }
                }
            }
        });
    }

    window.onload = () => {
        // Explicació per defecte
        document.getElementById('userInput').value = "Un taxi cobra 2.05 de baixada i 0.93 per cada km.";
        analitzarProblema();
    };
</script>
</body>
</html>
