<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathEngine Pro - Talls i Anàlisi</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0070f3">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    
    <style>
        :root { --p: #0070f3; --bg: #ffffff; --grid: #eaeaea; --text: #171717; --accent: #f43f5e; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; color: var(--text); }
        header { padding: 15px 20px; border-bottom: 1px solid var(--grid); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 1.1rem; color: var(--p); }
        .main-content { display: grid; grid-template-columns: 350px 1fr; flex: 1; overflow: hidden; }
        @media (max-width: 900px) { .main-content { grid-template-columns: 1fr; overflow: auto; } }
        .controls { padding: 20px; border-right: 1px solid var(--grid); overflow-y: auto; background: #fafafa; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        select, input { width: 100%; padding: 12px; border: 1px solid var(--grid); border-radius: 8px; font-size: 1rem; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .analysis-card { background: white; border: 1px solid var(--grid); border-radius: 12px; padding: 15px; margin-top: 15px; }
        .analysis-card h4 { margin: 0 0 8px 0; font-size: 0.7rem; color: var(--p); text-transform: uppercase; }
        .analysis-card p { margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; line-height: 1.4; }
        .cut-point { color: var(--accent); font-weight: bold; }
        #canvas-wrapper { flex: 1; position: relative; padding: 20px; }
    </style>
</head>
<body>

<header>
    <div class="logo">MATHENGINE // ANALYZER</div>
</header>

<div class="main-content">
    <div class="controls">
        <div class="input-group">
            <label>Tipus de Funció</label>
            <select id="model" onchange="updateInputs()">
                <option value="lineal">Lineal (y = mx + n)</option>
                <option value="quad">Quadràtica (y = ax² + bx + c)</option>
                <option value="manual">Expressió lliure</option>
            </select>
        </div>

        <div id="dynamic-fields"></div>
        <button class="btn" onclick="process()">CALCULAR TOTS ELS TALLS</button>

        <div class="analysis">
            <div class="analysis-card">
                <h4>Equació</h4>
                <p id="res-eq">-</p>
            </div>
            <div class="analysis-card">
                <h4>Tall Eix Y (Ordenada a l'origen)</h4>
                <p id="res-ty" class="cut-point">-</p>
            </div>
            <div class="analysis-card">
                <h4>Talls Eix X (Abscisses / Arrels)</h4>
                <p id="res-tx" class="cut-point">-</p>
            </div>
            <div class="analysis-card">
                <h4>Domini i Recorregut</h4>
                <p id="res-dom-im">-</p>
            </div>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    let myChart = null;

    function updateInputs() {
        const m = document.getElementById('model').value;
        const fields = document.getElementById('dynamic-fields');
        if (m === 'lineal') {
            fields.innerHTML = `
                <div class="input-group"><label>m (pendent)</label><input type="number" id="valM" value="2"></div>
                <div class="input-group"><label>n (tall Y)</label><input type="number" id="valN" value="-4"></div>
            `;
        } else if (m === 'quad') {
            fields.innerHTML = `
                <div class="input-group"><label>a (x²)</label><input type="number" id="valA" value="1"></div>
                <div class="input-group"><label>b (x)</label><input type="number" id="valB" value="-2"></div>
                <div class="input-group"><label>c (fix)</label><input type="number" id="valC" value="-3"></div>
            `;
        } else {
            fields.innerHTML = `<div class="input-group"><label>f(x)</label><input type="text" id="valFree" value="x^2 - 9"></div>`;
        }
    }

    function process() {
        const model = document.getElementById('model').value;
        let expr = "";
        let tallsX = [];
        
        try {
            if (model === 'lineal') {
                const m = parseFloat(document.getElementById('valM').value);
                const n = parseFloat(document.getElementById('valN').value);
                expr = `${m}*x + ${n}`;
                if (m !== 0) tallsX.push(-n / m);
            } else if (model === 'quad') {
                const a = parseFloat(document.getElementById('valA').value);
                const b = parseFloat(document.getElementById('valB').value);
                const c = parseFloat(document.getElementById('valC').value);
                expr = `${a}*x^2 + ${b}*x + ${c}`;
                // Fórmula de l'equació de segon grau
                const discriminant = b*b - 4*a*c;
                if (discriminant >= 0) {
                    tallsX.push((-b + Math.sqrt(discriminant)) / (2*a));
                    if (discriminant > 0) tallsX.push((-b - Math.sqrt(discriminant)) / (2*a));
                }
            } else {
                expr = document.getElementById('valFree').value;
                // Intentar buscar talls per aproximació en mode manual
                for(let i=-10; i<=10; i+=0.01) {
                    if (Math.abs(math.evaluate(expr, {x: i})) < 0.05) {
                        if (tallsX.length === 0 || Math.abs(tallsX[tallsX.length-1] - i) > 0.5) tallsX.push(i);
                    }
                }
            }

            const node = math.parse(expr);
            const f = node.compile();
            const labels = [], data = [], colors = [], radius = [];
            const limit = 10;

            for (let x = -limit; x <= limit; x += 0.2) {
                let y = f.evaluate({x: x});
                labels.push(x.toFixed(1));
                data.push(y);
                
                // Pintem els talls X trobats al gràfic
                let isTall = tallsX.some(tx => Math.abs(tx - x) < 0.15);
                let isTallY = Math.abs(x) < 0.1;

                if (isTall || isTallY) {
                    colors.push('#f43f5e'); radius.push(6);
                } else {
                    colors.push('rgba(0,0,0,0)'); radius.push(0);
                }
            }

            // Actualitzar interfície
            document.getElementById('res-eq').innerText = "f(x) = " + node.toString();
            document.getElementById('res-ty').innerText = `(0, ${f.evaluate({x:0}).toFixed(2)})`;
            document.getElementById('res-tx').innerText = tallsX.length > 0 
                ? tallsX.map(tx => `(${tx.toFixed(2)}, 0)`).join(", ") 
                : "No talla l'eix X";

            const yV = data.filter(v => isFinite(v));
            document.getElementById('res-dom-im').innerHTML = `Dom: ℝ <br> Img: [${Math.min(...yV).toFixed(1)}, ${Math.max(...yV).toFixed(1)}]`;

            renderChart(labels, data, colors, radius, limit);
        } catch (e) { alert("Error matemàtic!"); }
    }

    function renderChart(l, d, c, r, limit) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: l,
                datasets: [{ data: d, borderColor: '#0070f3', borderWidth: 3, pointBackgroundColor: c, pointRadius: r, tension: 0.3, fill: false }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { type: 'linear', position: 'center', min: -limit, max: limit, grid: { color: '#f0f0f0' } },
                    y: { type: 'linear', position: 'center', min: -limit, max: limit, grid: { color: '#f0f0f0' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = () => { updateInputs(); process(); };
</script>
</body>
</html>
