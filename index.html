<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathEngine Pro - Inspirat en Mathcraft</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --p: #6366f1; --s: #1e293b; --bg: #f8fafc; --acc: #f43f5e; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--s); margin: 0; padding: 20px; }
        .app-grid { display: grid; grid-template-columns: 400px 1fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 1000px) { .app-grid { grid-template-columns: 1fr; } }
        
        /* Panell de Control */
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .step { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #f1f5f9; }
        h3 { font-size: 0.9rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
        
        select, input { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 1rem; margin-top: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        button:hover { background: #4f46e5; transform: translateY(-2px); }

        /* Resultats Estil App Premium */
        .res-card { background: var(--s); color: white; padding: 20px; border-radius: 15px; margin-top: 20px; }
        .formula { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; color: #818cf8; text-align: center; margin: 15px 0; }
        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }
        .stat b { display: block; font-size: 0.7rem; color: #94a3b8; }
        
        .chart-container { height: 100%; min-height: 500px; }
    </style>
</head>
<body>

<div class="app-grid">
    <aside class="sidebar">
        <div class="card">
            <h2 style="margin-top:0; color: var(--p);">MathEngine Pro</h2>
            
            <div class="step">
                <h3>1. Quin tipus de problema és?</h3>
                <select id="m-type" onchange="ui()">
                    <option value="lin">Lineal (Cost fix + Variable)</option>
                    <option value="quad">Quadràtica (Moviment / Àrees)</option>
                    <option value="inv">Inversa (Repartiment / Temps)</option>
                    <option value="txt">Escriure fórmula directament</option>
                </select>
            </div>

            <div id="inputs" class="step">
                </div>

            <button onclick="resoldre()">ANALITZAR ARA</button>

            <div id="resultats" class="res-card" style="display:none">
                <h3>Solució Analítica</h3>
                <div id="out-eq" class="formula"></div>
                <div class="analysis-grid">
                    <div class="stat"><b>Domini (X)</b><span id="out-dom"></span></div>
                    <div class="stat"><b>Imatge (Y)</b><span id="out-im"></span></div>
                    <div class="stat"><b>Tall Eix Y</b><span id="out-ty"></span></div>
                    <div class="stat"><b>Tall Eix X</b><span id="out-tx"></span></div>
                </div>
            </div>
        </div>
    </aside>

    <main class="card chart-container">
        <canvas id="mainChart"></canvas>
    </main>
</div>

<script>
    let chart = null;

    function ui() {
        const t = document.getElementById('m-type').value;
        const box = document.getElementById('inputs');
        if(t === 'lin') {
            box.innerHTML = `
                <label>Valor Inicial (n):</label><input type="number" id="v1" value="2.05">
                <label>Creixement/unitat (m):</label><input type="number" id="v2" value="0.93">
            `;
        } else if(t === 'quad') {
            box.innerHTML = `
                <label>Coeficient a (x²):</label><input type="number" id="v1" value="1">
                <label>Coeficient b (x):</label><input type="number" id="v2" value="-4">
                <label>Terme c:</label><input type="number" id="v3" value="0">
            `;
        } else if(t === 'inv') {
            box.innerHTML = `<label>Constant K (k/x):</label><input type="number" id="v1" value="100">`;
        } else {
            box.innerHTML = `<label>Funció f(x):</label><input type="text" id="v1" value="x^2 - 4">`;
        }
    }

    function resoldre() {
        const type = document.getElementById('m-type').value;
        let expr = "";
        
        if(type === 'lin') expr = `${document.getElementById('v2').value} * x + ${document.getElementById('v1').value}`;
        else if(type === 'quad') expr = `${document.getElementById('v1').value}*x^2 + ${document.getElementById('v2').value}*x + ${document.getElementById('v3').value}`;
        else if(type === 'inv') expr = `${document.getElementById('v1').value} / x`;
        else expr = document.getElementById('v1').value;

        processar(expr);
    }

    function processar(expr) {
        try {
            const node = math.parse(expr);
            const f = node.compile();
            const labels = [], data = [], colors = [], radius = [];
            
            // Interval automàtic lògic
            let xMin = -10, xMax = 10;
            if(expr.includes('/') || expr.includes('x^2')) { xMin = -10; xMax = 10; } 
            else { xMin = 0; xMax = 20; }

            const pas = (xMax - xMin) / 50;
            for(let x = xMin; x <= xMax; x = math.round(x + pas, 10)) {
                let y = f.evaluate({x: x});
                if(isFinite(y)) {
                    labels.push(x.toFixed(1));
                    data.push(y);
                    // Punts de Tall (Fitxa 3)
                    if(Math.abs(y) < 0.5 || Math.abs(x) < 0.1) { colors.push('#f43f5e'); radius.push(6); }
                    else { colors.push('#6366f1'); radius.push(0); }
                } else {
                    labels.push(x); data.push(null); colors.push(null); radius.push(0);
                }
            }

            // UI
            document.getElementById('resultats').style.display = 'block';
            document.getElementById('out-eq').innerText = "y = " + node.toString();
            document.getElementById('out-dom').innerText = `[${xMin}, ${xMax}]`;
            document.getElementById('out-im').innerText = `[${Math.min(...data.filter(v=>v!=null)).toFixed(1)}, ${Math.max(...data.filter(v=>v!=null)).toFixed(1)}]`;
            
            const ty = f.evaluate({x:0});
            document.getElementById('out-ty').innerText = isFinite(ty) ? `(0, ${ty})` : "No existeix";
            document.getElementById('out-tx').innerText = "Veure punts vermells";

            dibuixar(labels, data, colors, radius);
        } catch(e) { alert("Error en l'expressió matemàtica"); }
    }

    function dibuixar(l, d, c, r) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: l,
                datasets: [{
                    data: d, borderColor: '#6366f1', borderWidth: 4,
                    pointBackgroundColor: c, pointRadius: r, tension: 0.3, fill: false
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    x: { grid: { display: false } },
                    y: { grid: { color: '#f1f5f9' } }
                }
            }
        });
    }

    window.onload = () => { ui(); resoldre(); };
</script>
</body>
</html>
